name: Scheduled PR Newswire Import & Webflow Sync

on:
  schedule:
    # Run every 48 hours (every 2 days at midnight UTC)
    - cron: '0 0 */2 * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Notte import (Ispire-specific articles)
        run: npm run notte
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          NOTTE_API_TOKEN: ${{ secrets.NOTTE_API_TOKEN }}
          NEWS_SOURCE_URL: ${{ secrets.NEWS_SOURCE_URL }}

      - name: Run Webflow sync
        run: npm run sync
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_COLLECTION_ID: ${{ secrets.WEBFLOW_COLLECTION_ID }}